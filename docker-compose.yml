services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      - PORT=8787
      - DATABASE_PATH=/data/cash.db
      - JWT_SECRET=${JWT_SECRET:-dev-secret-hush}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-128a5f5152feecd29746e8c0e768393e}
      - ENVIRONMENT=production
    volumes:
      - cash-data:/data
    networks:
      - cash-network

  web:
    build:
      context: .
      target: web
      args:
        - VITE_API_URL=/api
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - cash-network
    depends_on:
      - api

volumes:
  cash-data:

networks:
  cash-network:
    driver: bridge
