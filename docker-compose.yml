services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      - PORT=8787
      - DATABASE_PATH=/data/ledger.db
      - JWT_SECRET=${JWT_SECRET:-dev-secret-hush}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-128a5f5152feecd29746e8c0e768393e}
      - ENVIRONMENT=production
      - PLATFORM_DEFAULT_CURRENCY=${PLATFORM_DEFAULT_CURRENCY:-USD}
      - PLATFORM_SUPPORTED_CURRENCIES=${PLATFORM_SUPPORTED_CURRENCIES:-USD,EUR,GBP,JPY,CAD,AUD}
    volumes:
      - ledger-data:/data
    networks:
      - ledger-network

  web:
    build:
      context: .
      target: web
      args:
        - VITE_API_URL=/api
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - ledger-network
    depends_on:
      - api

volumes:
  ledger-data:

networks:
  ledger-network:
    driver: bridge
