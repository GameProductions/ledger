name: Deploy to Cloudflare Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "a5b3081992c9b5b608c5a39fea5a18d0"
          workingDirectory: "apps/api"
          wranglerVersion: "4.76.0"
          command: deploy --minify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Provision Secrets
        run: |
          for secret in \
            JWT_SECRET \
            ENCRYPTION_KEY \
            METHOD_API_KEY \
            PLAID_CLIENT_ID \
            PLAID_SECRET \
            AKOYA_CLIENT_ID \
            AKOYA_SECRET \
            DISCORD_TOKEN \
            DISCORD_PUBLIC_KEY \
            DISCORD_WEBHOOK_URL \
            RESEND_API_KEY; do
            echo "Provisioning $secret..."
            echo "${!secret}" | npx wrangler secret put $secret --cwd apps/api
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          METHOD_API_KEY: ${{ secrets.METHOD_API_KEY }}
          PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
          PLAID_SECRET: ${{ secrets.PLAID_SECRET }}
          AKOYA_CLIENT_ID: ${{ secrets.AKOYA_CLIENT_ID }}
          AKOYA_SECRET: ${{ secrets.AKOYA_SECRET }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_PUBLIC_KEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ENVIRONMENT: production
