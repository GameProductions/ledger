services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: docker.env
    environment:
      - PORT=8787
      - DATABASE_PATH=/data/ledger.db
    volumes:
      - ledger-data:/data
    networks:
      - ledger-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/ledger/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  web:
    build:
      context: .
      target: web
      args:
        - VITE_API_URL=/api
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - ledger-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  ledger-data:

networks:
  ledger-network:
    driver: bridge
