services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=8787
      - DATABASE_PATH=/data/ledger.db
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ledger-data:/data
    networks:
      - ledger-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/ledger/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  web:
    build:
      context: .
      target: web
      args:
        - VITE_API_URL=/api
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - ledger-network
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  setup:
    image: alpine:latest
    container_name: ledger-setup
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "
        if [ ! -f .env ]; then
          echo 'Initializing LEDGER environment...' &&
          cp docker.env .env &&
          JWT_GEN=\$$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 64 | head -n 1) &&
          ENC_GEN=\$$(cat /dev/urandom | tr -dc 'a-f0-9' | fold -w 32 | head -n 1) &&
          sed -i \"s/JWT_SECRET=.*/JWT_SECRET=\$JWT_GEN/\" .env &&
          sed -i \"s/ENCRYPTION_KEY=.*/ENCRYPTION_KEY=\$ENC_GEN/\" .env &&
          echo 'SUCCESS: .env initialized with high-entropy unique keys.'
        else
          echo 'SKIPPED: .env already exists. Maintaining existing security keys.'
        fi
      "

volumes:
  ledger-data:

networks:
  ledger-network:
    driver: bridge
