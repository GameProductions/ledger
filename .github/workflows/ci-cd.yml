name: LEDGER CI/CD Pipeline 🛡️🧬🏺

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  ci:
    name: 🧪 Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4
      - uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps
      - name: 🧬 Build Check
        run: npm run build --if-present

  deploy-unified:
    name: 🚀 Deploy Unified Worker (Cloudflare)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4
      - uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c # v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Load Secrets from 1Password
        uses: 1password/load-secrets-action@2a9101f21de4fcc2ae46583a248b43d50ad0476a # v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # Global & Fleet Infrastructure
          CLOUDFLARE_API_TOKEN: "op://6wgu5yz5yphvacdimgc64ej65i/ai5ikix3ghnryezfrrygzgeq3e/CLOUDFLARE_API_TOKEN"
          CLOUDFLARE_ACCOUNT_ID: "op://6wgu5yz5yphvacdimgc64ej65i/vzqtt3fqxw242wfhvxthgpnfou/CLOUDFLARE_ACCOUNT_ID"
          ENCRYPTION_KEY: "op://6wgu5yz5yphvacdimgc64ej65i/7r4z25yryhmf5h772m6twnpqoi/ENCRYPTION_KEY"
          SHARED_SERVICE_SECRET: "op://6wgu5yz5yphvacdimgc64ej65i/7r4z25yryhmf5h772m6twnpqoi/SHARED_SERVICE_SECRET"
          # Ledger Specifics
          JWT_SECRET: "op://6wgu5yz5yphvacdimgc64ej65i/ffoqucjv6dyilbhqnttscdmubi/JWT_SECRET"
          DISCORD_TOKEN: "op://6wgu5yz5yphvacdimgc64ej65i/ffoqucjv6dyilbhqnttscdmubi/DISCORD_TOKEN"
          DISCORD_CLIENT_ID: "op://6wgu5yz5yphvacdimgc64ej65i/ffoqucjv6dyilbhqnttscdmubi/DISCORD_CLIENT_ID"
          DISCORD_CLIENT_SECRET: "op://6wgu5yz5yphvacdimgc64ej65i/ffoqucjv6dyilbhqnttscdmubi/DISCORD_CLIENT_SECRET"
          # Integrations
          GOOGLE_CLIENT_ID: "op://6wgu5yz5yphvacdimgc64ej65i/pvwf44uvltoovp7kvfg6avwkce/CLIENT_ID"
          GOOGLE_CLIENT_SECRET: "op://6wgu5yz5yphvacdimgc64ej65i/pvwf44uvltoovp7kvfg6avwkce/CLIENT_SECRET"
          DROPBOX_CLIENT_ID: "op://6wgu5yz5yphvacdimgc64ej65i/vaypxtguau4ykrady3tzlku5uu/CLIENT_ID"
          DROPBOX_CLIENT_SECRET: "op://6wgu5yz5yphvacdimgc64ej65i/vaypxtguau4ykrady3tzlku5uu/CLIENT_SECRET"
          ONEDRIVE_CLIENT_ID: "op://6wgu5yz5yphvacdimgc64ej65i/74fn6rakxisvpspomszabw6gqm/CLIENT_ID"
          ONEDRIVE_CLIENT_SECRET: "op://6wgu5yz5yphvacdimgc64ej65i/74fn6rakxisvpspomszabw6gqm/CLIENT_SECRET"

      - name: 🏗️ Build Application UI
        run: npm run build

      - name: 🚀 Deploy to Cloudflare
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15
        with:
          command: deploy --config wrangler.jsonc --minify
          secrets: |
            ENCRYPTION_KEY
            SHARED_SERVICE_SECRET
            JWT_SECRET
            DISCORD_TOKEN
            DISCORD_CLIENT_ID
            DISCORD_CLIENT_SECRET
            GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET
            DROPBOX_CLIENT_ID
            DROPBOX_CLIENT_SECRET
            ONEDRIVE_CLIENT_ID
            ONEDRIVE_CLIENT_SECRET
