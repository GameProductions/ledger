<html lang="en">

    <link rel="icon" type="image/png" href="/assets/icon.png" />
    <link rel="apple-touch-icon" href="/assets/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO & Social Media -->
    <title>LEDGER — Sovereign Financial Infrastructure</title>
    <meta name="description" content="Unified financial command for modern households. Automated sync, real-time insights, and proactive safety budgeting." />
    <meta property="og:title" content="LEDGER" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
